name: "🏛️ Infrastructure Change Quality Gate"

on:
  pull_request:
    paths:
      - "**.md"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect change request files
        id: detect
        run: |
          files=$(git diff --name-only origin/${{ github.base_ref }} | grep -E '\.md$' || true)
          echo "files=$files" >> $GITHUB_OUTPUT

      - name: Run policy validation
        id: gate
        if: steps.detect.outputs.files != ''
        run: |
          mkdir -p evidence/compliance-reports

          for file in ${{ steps.detect.outputs.files }}; do
            echo "Validating $file"
            python validation/pre-merge-checks/validate-change-request.py "$file"
          done

      - name: Aggregate results
        if: always()
        run: |
          echo "## Gatehouse Quality Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          passed=true

          for f in evidence/compliance-reports/report-*.json; do
            if [ -f "$f" ]; then
              file=$(jq -r '.file' "$f")
              score=$(jq -r '.compliance_score' "$f")
              rc=$(jq -r '.risk_class' "$f")
              status=$(jq -r '.passed' "$f")

              echo "### $file" >> "$GITHUB_STEP_SUMMARY"
              echo "- Risk class: $rc" >> "$GITHUB_STEP_SUMMARY"
              echo "- Compliance score: $score" >> "$GITHUB_STEP_SUMMARY"
              echo "- Passed: $status" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"

              if [ "$status" != "true" ]; then
                passed=false
              fi
            fi
          done

          if [ "$passed" = true ]; then
            echo "## ✅ OVERALL: PASSED" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ❌ OVERALL: FAILED - merge blocked" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
