name: Gatehouse Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  gatehouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load config
        id: config
        run: |
          CONFIG_FILE=".gatehouse/config.yaml"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "::error::Missing Gatehouse config"
            exit 1
          fi
          echo "config_path=$CONFIG_FILE" >> "$GITHUB_OUTPUT"

      - name: Evaluate policy
        id: policy
        run: |
          set +e

          RESULT="pass"
          REASON="All checks passed"

          # Esimerkki: PR description check (ei kovakoodattu arvo, vain existence)
          if [ -z "${{ github.event.pull_request.body }}" ]; then
            RESULT="fail"
            REASON="Missing PR description"
          fi

          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

          if [ "$RESULT" = "fail" ]; then
            echo "::error::$REASON"
            exit 1
          fi

      - name: Generate audit evidence
        if: always()
        run: |
          set +e

          mkdir -p gatehouse-output

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SHA="${{ github.sha }}"
          ACTOR="${{ github.actor }}"

          JSON_FILE="gatehouse-output/evidence.json"
          MD_FILE="gatehouse-output/evidence.md"

          cat <<EOF > $JSON_FILE
          {
            "timestamp": "$TIMESTAMP",
            "commit": "$SHA",
            "actor": "$ACTOR",
            "result": "${{ steps.policy.outputs.result }}",
            "reason": "${{ steps.policy.outputs.reason }}"
          }
          EOF

          cat <<EOF > $MD_FILE
          ## 🛡️ Gatehouse Audit Report

          **Timestamp:** $TIMESTAMP  
          **Commit:** $SHA  
          **Actor:** $ACTOR  

          **Result:** ${{ steps.policy.outputs.result }}  
          **Reason:** ${{ steps.policy.outputs.reason }}
          EOF

          sha256sum $JSON_FILE > gatehouse-output/evidence.sha256 || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatehouse-audit
          path: gatehouse-output/

      - name: Job summary
        if: always()
        run: |
          set +e

          if [ -n "$GITHUB_STEP_SUMMARY" ]; then
            {
              echo "## 🛡️ Gatehouse Quality Gate"
              echo ""
              echo "**Result:** ${{ steps.policy.outputs.result }}"
              echo "**Reason:** ${{ steps.policy.outputs.reason }}"
            } >> "$GITHUB_STEP_SUMMARY" || true
          fi