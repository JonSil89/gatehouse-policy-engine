name: "🏛️ Infrastructure Change Quality Gate"

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'templates/**'
      - 'docs/**'
      - 'examples/**'
      - 'validation/**'

  push:
    branches: [ main, develop ]

  workflow_dispatch:
    inputs:
      change_request_file:
        description: "Path to change request file (relative)"
        required: false
        default: ""

jobs:

  # ============================================================
  # JOB 1: Policy Validation
  # ============================================================
  validate:
    name: "Quality Gate - Policy Validation"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🐍 Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "🔍 Detect change request files"
        id: detect
        shell: bash
        run: |
          set -e

          # 1️⃣ Manual dispatch
          if [ -n "${{ github.event.inputs.change_request_file }}" ]; then
            echo "files=${{ github.event.inputs.change_request_file }}" >> "$GITHUB_OUTPUT"
            echo "source=manual" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2️⃣ Pull request
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only --diff-filter=ACMR \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}" \
              -- 'examples/*.md' 'templates/*.md' | tr '\n' ' ')

            if [ -n "$FILES" ]; then
              echo "files=$FILES" >> "$GITHUB_OUTPUT"
              echo "source=pull_request" >> "$GITHUB_OUTPUT"
            else
              echo "files=" >> "$GITHUB_OUTPUT"
              echo "source=pull_request_no_files" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # 3️⃣ Push → run against all examples
          shopt -s nullglob
          FILE_ARRAY=(examples/*.md)

          if [ ${#FILE_ARRAY[@]} -eq 0 ]; then
            echo "files=" >> "$GITHUB_OUTPUT"
          else
            echo "files=${FILE_ARRAY[*]}" >> "$GITHUB_OUTPUT"
          fi

          echo "source=push_smoke_test" >> "$GITHUB_OUTPUT"

      - name: "🚀 Run Policy Engine"
        id: gate
        if: steps.detect.outputs.files != ''
        shell: bash
        run: |
          set +e

          echo "=================================================="
          echo " Gatehouse Policy Engine"
          echo " ISO 27001 Aligned Validation"
          echo " Source: ${{ steps.detect.outputs.source }}"
          echo "=================================================="
          echo ""

          FAILED=0

          for FILE in ${{ steps.detect.outputs.files }}; do
            echo "Validating: $FILE"
            echo "--------------------------------------------------"
            python3 validation/pre-merge-checks/validate-change-request.py "$FILE"
            if [ $? -ne 0 ]; then
              FAILED=1
              echo "FAILED: $FILE"
              echo ""
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "QUALITY GATE: BLOCKED"
            exit 1
          fi

          echo "QUALITY GATE: ALL CHECKS PASSED"
          exit 0

      - name: "ℹ️ No change request files detected"
        if: steps.detect.outputs.files == ''
        run: |
          echo "No change request files detected."
          echo "Skipping validation."

      - name: "📦 Upload Audit Reports"
        if: always() && steps.detect.outputs.files != ''
        uses: actions/upload-artifact@v4
        with:
          name: gatehouse-audit-reports-${{ github.run_number }}
          path: evidence/compliance-reports/
          retention-days: 90

      - name: "📋 Post summary"
        if: always()
        shell: bash
        run: |
          echo "## 🏛️ Gatehouse Quality Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          shopt -s nullglob
          for f in evidence/compliance-reports/report-*.md; do
            echo "<details><summary>📄 $(basename "$f")</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat "$f" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          done

          if [ "${{ steps.gate.outcome }}" = "success" ]; then
            echo "### ✅ PASSED" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.gate.outcome }}" = "failure" ]; then
            echo "### ❌ FAILED - merge blocked" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ℹ️ SKIPPED" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| :--- | :--- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Files | \`${{ steps.detect.outputs.files || 'none' }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | ${{ github.event_name }} (${{ steps.detect.outputs.source }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ISO Controls | A.12.1.2 · A.14.2.2 · A.12.4.1 |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Audit reports retained 90 days under Artifacts." >> "$GITHUB_STEP_SUMMARY"

  # ============================================================
  # JOB 2: Lint & Syntax
  # ============================================================
  lint:
    name: "Quality Gate - Lint and Syntax"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "✅ Validate Python syntax"
        run: |
          python3 -m py_compile validation/pre-merge-checks/validate-change-request.py
          echo "Python syntax OK"

      - name: "✅ Check line endings (LF only)"
        run: |
          CRLF=$(grep -rl $'\r' --include='*.md' --include='*.py' --include='*.yml' . || true)
          if [ -n "$CRLF" ]; then
            echo "ERROR: CRLF detected:"
            echo "$CRLF"
            exit 1
          fi
          echo "Line endings OK"

      - name: "✅ Validate YAML syntax"
        run: |
          pip install pyyaml -q
          python3 - <<EOF
          import yaml, glob, sys
          errors = []
          for f in glob.glob('.github/workflows/*.yml'):
              try:
                  yaml.safe_load(open(f))
              except yaml.YAMLError as e:
                  errors.append(f"{f}: {e}")
          if errors:
              print("YAML errors found:")
              for e in errors:
                  print(e)
              sys.exit(1)
          print("YAML syntax OK")
          EOF
