name: "🏛️ Gatehouse Infrastructure Quality Gate"

on:
  push:
    branches: [ main, develop ]
    paths:
      - "**.md"
  pull_request:
    paths:
      - "**.md"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jq || true
          python -m pip install pyyaml

      - name: Detect change request files
        id: detect
        run: |
          # Jos PR, verrataan target-haaraan. Jos push, verrataan edelliseen committiin.
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            files=$(git diff --name-only origin/${{ github.base_ref }} | grep -E '\.md$' || true)
          else
            files=$(git diff --name-only HEAD^ HEAD | grep -E '\.md$' || true)
          fi
          echo "files=$files" >> $GITHUB_OUTPUT

      - name: Run policy validation
        if: steps.detect.outputs.files != ''
        run: |
          mkdir -p evidence/compliance-reports
          for file in ${{ steps.detect.outputs.files }}; do
            if [ -f "$file" ]; then
              echo "Validating $file"
              python validation/pre-merge-checks/validate-change-request.py "$file"
            fi
          done

      - name: Aggregate results and generate GitHub Job Summary
        if: always()
        run: |
          echo "## 🛡️ Gatehouse Infrastructure Quality Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "Tämä automaattinen tarkistus varmistaa, että muutospyyntö noudattaa tietoturva- ja riskienhallintakäytäntöjä." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          overall_passed=true
          reports_found=false
          
          if [ -d "evidence/compliance-reports" ]; then
            for f in evidence/compliance-reports/report-*.json; do
              if [ -f "$f" ]; then
                reports_found=true
                file=$(jq -r '.file' "$f")
                score=$(jq -r '.compliance_score' "$f")
                rc=$(jq -r '.final_risk_class' "$f")
                status=$(jq -r '.passed' "$f")
                errors=$(jq -r '.errors | if length > 0 then map("- " + .) | join("<br>") else "✅ Ei virheitä" end' "$f")
                
                icon=$([ "$status" == "true" ] && echo "✅" || echo "❌")
                echo "### $icon Tiedosto: $file" >> "$GITHUB_STEP_SUMMARY"
                echo "| Mittari | Tieto |" >> "$GITHUB_STEP_SUMMARY"
                echo "| :--- | :--- |" >> "$GITHUB_STEP_SUMMARY"
                echo "| **Compliance Score** | **$score / 100** |" >> "$GITHUB_STEP_SUMMARY"
                echo "| **Lopullinen Riskiluokka** | $rc |" >> "$GITHUB_STEP_SUMMARY"
                
                if [ "$status" != "true" ]; then
                  overall_passed=false
                  echo "> [!CAUTION]" >> "$GITHUB_STEP_SUMMARY"
                  echo "> **Puutteet:** $errors" >> "$GITHUB_STEP_SUMMARY"
                fi
              fi
            done
          fi

          if [ "$reports_found" = false ]; then
             echo "Ei muutoksia markdown-tiedostoissa." >> "$GITHUB_STEP_SUMMARY"
          fi
