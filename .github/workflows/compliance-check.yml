yaml

name: 🏛️ Gatehouse Compliance Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      change_request_file:
        description: 'Path to change request file'
        required: false
        default: 'examples/example-class2-cicd-pipeline-update.md'

jobs:
  validate:
    name: Quality Gate — Policy Validation
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔍 Detect change request files
        id: detect
        run: |
          # Manual dispatch: use specified file
          if [ -n "${{ github.event.inputs.change_request_file }}" ]; then
            echo "files=${{ github.event.inputs.change_request_file }}" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # PR: find modified change request files
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only --diff-filter=ACMR \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}" \
              -- 'examples/*.md' 'templates/*.md' | tr '\n' ' ')
            if [ -n "$FILES" ]; then
              echo "files=$FILES" >> "$GITHUB_OUTPUT"
              echo "found=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Push to main/develop: validate example as smoke test
          echo "files=examples/example-class2-cicd-pipeline-update.md" >> "$GITHUB_OUTPUT"
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: 🚀 Run Policy Engine
        id: gate
        run: |
          echo "=================================================="
          echo "  🏛️ Gatehouse Policy Engine"
          echo "  ISO 27001 Aligned Validation"
          echo "=================================================="

          FAILED=0

          for FILE in ${{ steps.detect.outputs.files }}; do
            echo ""
            echo "Validating: $FILE"
            echo "--------------------------------------------------"

            python3 validation/pre-merge-checks/validate-change-request.py "$FILE" || {
              FAILED=1
            }
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "=================================================="
            echo "  ❌ QUALITY GATE: BLOCKED"
            echo "  Fix the errors above before merging."
            echo "=================================================="
            exit 1
          fi

          echo ""
          echo "=================================================="
          echo "  ✅ QUALITY GATE: ALL CHECKS PASSED"
          echo "=================================================="

      - name: 📊 Upload Audit Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatehouse-audit-reports-${{ github.run_number }}
          path: evidence/compliance-reports/
          retention-days: 90

      - name: 📋 Post summary to GitHub
        if: always()
        run: |
          echo "## 🏛️ Gatehouse Quality Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.gate.outcome }}" = "success" ]; then
            echo "### ✅ PASSED" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ❌ FAILED" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| :--- | :--- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Files validated | \`${{ steps.detect.outputs.files }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run | #${{ github.run_number }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ISO Controls | A.12.1.2 · A.14.2.2 · A.12.4.1 |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Audit reports available under **Artifacts** (retained 90 days)." >> "$GITHUB_STEP_SUMMARY"

  lint:
    name: Quality Gate — Syntax & Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ✅ Validate Python syntax
        run: |
          python3 -m py_compile validation/pre-merge-checks/validate-change-request.py
          echo "Python syntax OK"

      - name: ✅ Check line endings (LF only)
        run: |
          CRLF=$(grep -rl $'\r' --include='*.md' --include='*.py' --include='*.yml' . || true)
          if [ -n "$CRLF" ]; then
            echo "ERROR: CRLF line endings found in:"
            echo "$CRLF"
            exit 1
          fi
          echo "Line endings OK"

      - name: ✅ Check for absolute paths
        run: |
          ABS=$(grep -rn '[A-Z]:\\' --include='*.md' --include='*.py' --include='*.yml' . || true)
          if [ -n "$ABS" ]; then
            echo "ERROR: Absolute paths found:"
            echo "$ABS"
            exit 1
          fi
          echo "Path check OK"

