name: "🏛️ Gatehouse Compliance Check"

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    name: "Quality Gate - Policy Validation"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "📦 Install dependencies"
        run: |
          python3 -m pip install --upgrade pip
          pip install pyyaml

      - name: "🚀 Run Policy Engine"
        run: |
          python3 validation/pre-merge-checks/validate-change-request.py examples/example-class2-cicd-pipeline-update.md

      - name: "📦 Upload Audit Reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatehouse-audit-reports
          path: evidence/compliance-reports/
          retention-days: 90
