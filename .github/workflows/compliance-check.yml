name: 🏛️ Gatehouse Compliance Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🚀 Run Policy Engine
        run: |
          python3 validation/pre-merge-checks/validate-change-request.py examples/example-class2-cicd-pipeline-update.md
        
      - name: 📊 Upload Audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatehouse-audit-report
          path: evidence/compliance-reports/report.md

